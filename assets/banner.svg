<svg width="900" height="210" viewBox="0 0 900 210" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3498DB"/>
      <stop offset="100%" style="stop-color:#2ECC71"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3498DB;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#3498DB;stop-opacity:0"/>
    </linearGradient>
    <style>
      @keyframes pulse {
        0%, 100% { opacity: 0.15; }
        50% { opacity: 0.55; }
      }
      @keyframes pulse2 {
        0%, 100% { opacity: 0.1; }
        50% { opacity: 0.45; }
      }
      @keyframes dash {
        to { stroke-dashoffset: -24; }
      }
      @keyframes fadein {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      .d1 { animation: pulse  2.4s ease-in-out infinite; }
      .d2 { animation: pulse  2.4s ease-in-out infinite 0.4s; }
      .d3 { animation: pulse  2.4s ease-in-out infinite 0.8s; }
      .d4 { animation: pulse2 2.4s ease-in-out infinite 1.2s; }
      .d5 { animation: pulse2 2.4s ease-in-out infinite 1.6s; }
      .d6 { animation: pulse2 2.4s ease-in-out infinite 2.0s; }
      .wire { stroke-dasharray: 6 6; animation: dash 1.8s linear infinite; }
      .name { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif; font-size: 44px; font-weight: 700; fill: #ECF0F1; }
      .sub  { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif; font-size: 15px; fill: #7F8C8D; letter-spacing: 0.5px; }
      .tag  { font-family: 'Courier New', Courier, monospace; font-size: 12px; fill: #2ECC71; opacity: 0.75; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="210" rx="10" fill="url(#bg)"/>

  <!-- Glow wash behind text -->
  <rect x="0" y="0" width="620" height="210" rx="10" fill="url(#glow)"/>

  <!-- Left accent bar -->
  <rect x="36" y="48" width="4" height="114" rx="2" fill="url(#accent)"/>

  <!-- Name -->
  <text x="56" y="108" class="name">Ahmad Rafee</text>

  <!-- Separator line -->
  <line x1="56" y1="120" x2="580" y2="120" stroke="#2C3E50" stroke-width="1"/>

  <!-- Subtitle -->
  <text x="58" y="140" class="sub">Senior Software Engineer · Tech Lead · DevOps &amp; Ops Lead</text>

  <!-- Tag line -->
  <text x="58" y="162" class="tag">// Bern, Switzerland · MSc CS @ SJMCS + WUT · PHP · Java · Python · K8s</text>

  <!-- ── Right side decoration ── -->

  <!-- Dot grid (6 cols × 5 rows) -->
  <g fill="#3498DB">
    <!-- row 1 -->
    <circle cx="680" cy="58"  r="2.2" class="d1"/>
    <circle cx="705" cy="58"  r="2.2" class="d2"/>
    <circle cx="730" cy="58"  r="2.2" class="d3"/>
    <circle cx="755" cy="58"  r="2.2" class="d4"/>
    <circle cx="780" cy="58"  r="2.2" class="d5"/>
    <circle cx="805" cy="58"  r="2.2" class="d6"/>
    <circle cx="830" cy="58"  r="2.2" class="d1"/>
    <circle cx="855" cy="58"  r="2.2" class="d2"/>
    <!-- row 2 -->
    <circle cx="680" cy="83"  r="2.2" class="d3"/>
    <circle cx="705" cy="83"  r="2.2" class="d4"/>
    <circle cx="730" cy="83"  r="2.2" class="d5"/>
    <circle cx="755" cy="83"  r="2.2" class="d6"/>
    <circle cx="780" cy="83"  r="2.2" class="d1"/>
    <circle cx="805" cy="83"  r="2.2" class="d2"/>
    <circle cx="830" cy="83"  r="2.2" class="d3"/>
    <circle cx="855" cy="83"  r="2.2" class="d4"/>
    <!-- row 3 -->
    <circle cx="680" cy="108" r="2.2" class="d5"/>
    <circle cx="705" cy="108" r="2.2" class="d6"/>
    <circle cx="730" cy="108" r="2.2" class="d1"/>
    <circle cx="755" cy="108" r="2.2" class="d2"/>
    <circle cx="780" cy="108" r="2.2" class="d3"/>
    <circle cx="805" cy="108" r="2.2" class="d4"/>
    <circle cx="830" cy="108" r="2.2" class="d5"/>
    <circle cx="855" cy="108" r="2.2" class="d6"/>
    <!-- row 4 -->
    <circle cx="680" cy="133" r="2.2" class="d2"/>
    <circle cx="705" cy="133" r="2.2" class="d3"/>
    <circle cx="730" cy="133" r="2.2" class="d4"/>
    <circle cx="755" cy="133" r="2.2" class="d5"/>
    <circle cx="780" cy="133" r="2.2" class="d6"/>
    <circle cx="805" cy="133" r="2.2" class="d1"/>
    <circle cx="830" cy="133" r="2.2" class="d2"/>
    <circle cx="855" cy="133" r="2.2" class="d3"/>
    <!-- row 5 -->
    <circle cx="680" cy="158" r="2.2" class="d4"/>
    <circle cx="705" cy="158" r="2.2" class="d5"/>
    <circle cx="730" cy="158" r="2.2" class="d6"/>
    <circle cx="755" cy="158" r="2.2" class="d1"/>
    <circle cx="780" cy="158" r="2.2" class="d2"/>
    <circle cx="805" cy="158" r="2.2" class="d3"/>
    <circle cx="830" cy="158" r="2.2" class="d4"/>
    <circle cx="855" cy="158" r="2.2" class="d5"/>
  </g>

  <!-- Circuit connector lines from text area into dot grid -->
  <g stroke="#3498DB" stroke-width="1.2" fill="none" opacity="0.5">
    <polyline points="636,108 655,108 655,83 672,83" class="wire"/>
    <polyline points="636,120 648,120 648,133 672,133" class="wire"/>
  </g>

  <!-- Connector node circles -->
  <circle cx="636" cy="108" r="3" fill="none" stroke="#3498DB" stroke-width="1.2" opacity="0.6"/>
  <circle cx="636" cy="120" r="3" fill="none" stroke="#2ECC71" stroke-width="1.2" opacity="0.6"/>

</svg>
