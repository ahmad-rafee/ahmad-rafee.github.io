<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ahmad Rafee — Senior Software Engineer</title>
  <meta name="description" content="Senior Software Engineer, Tech Lead, and DevOps & Ops Lead based in Bern, Switzerland." />

  <!-- Marked.js for markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- Highlight.js for code blocks -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <!-- Mermaid.js for diagrams -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --bg2:       #161b22;
      --bg3:       #21262d;
      --border:    #30363d;
      --text:      #c9d1d9;
      --text-dim:  #7f8c8d;
      --blue:      #3498DB;
      --green:     #2ECC71;
      --heading:   #ECF0F1;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 15px;
      line-height: 1.7;
      min-height: 100vh;
    }

    /* ── Layout ── */
    #app {
      max-width: 860px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* ── Loading / error states ── */
    #status {
      text-align: center;
      padding: 80px 0;
      color: var(--text-dim);
      font-size: 14px;
    }
    #status .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Rendered markdown ── */
    #content { display: none; }

    #content img {
      max-width: 100%;
      height: auto;
      border-radius: 6px;
    }

    /* Center-aligned divs from the README */
    #content div[align="center"] {
      text-align: center;
    }

    #content h1, #content h2, #content h3,
    #content h4, #content h5, #content h6 {
      color: var(--heading);
      font-weight: 600;
      line-height: 1.3;
      margin: 1.8em 0 0.6em;
    }
    #content h1 { font-size: 2em;   border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
    #content h2 { font-size: 1.4em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
    #content h3 { font-size: 1.15em; }

    #content p  { margin: 0.8em 0; }
    #content a  { color: var(--blue); text-decoration: none; }
    #content a:hover { text-decoration: underline; }

    #content ul, #content ol {
      padding-left: 1.6em;
      margin: 0.6em 0;
    }
    #content li { margin: 0.3em 0; }

    #content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2em 0;
    }

    #content table {
      width: 100%;
      border-collapse: collapse;
      margin: 1em 0;
      font-size: 14px;
    }
    #content th, #content td {
      border: 1px solid var(--border);
      padding: 8px 14px;
      text-align: left;
    }
    #content th {
      background: var(--bg2);
      color: var(--heading);
      font-weight: 600;
    }
    #content tr:nth-child(even) { background: var(--bg2); }

    #content code {
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      font-size: 0.875em;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.15em 0.4em;
      color: var(--green);
    }

    #content pre {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      overflow-x: auto;
      margin: 1em 0;
    }
    #content pre code {
      background: none;
      border: none;
      padding: 0;
      color: var(--text);
      font-size: 0.85em;
    }

    #content blockquote {
      border-left: 3px solid var(--blue);
      padding: 0.5em 1em;
      margin: 1em 0;
      color: var(--text-dim);
      background: var(--bg2);
      border-radius: 0 6px 6px 0;
    }

    /* Mermaid diagram placeholder styling */
    .mermaid-block {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin: 1em 0;
      font-family: monospace;
      font-size: 13px;
      color: var(--text-dim);
      white-space: pre;
      overflow-x: auto;
    }

    /* ── Sticky nav ── */
    nav {
      position: sticky;
      top: 0;
      background: rgba(13, 17, 23, 0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      padding: 10px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 100;
    }
    nav .name {
      font-weight: 600;
      color: var(--heading);
      font-size: 14px;
    }
    nav .links a {
      color: var(--text-dim);
      font-size: 13px;
      text-decoration: none;
      margin-left: 20px;
      transition: color 0.2s;
    }
    nav .links a:hover { color: var(--blue); }

    /* ── Footer ── */
    footer {
      text-align: center;
      color: var(--text-dim);
      font-size: 12px;
      padding: 24px 0 0;
      border-top: 1px solid var(--border);
      margin-top: 40px;
    }
    footer a { color: var(--text-dim); }

    @media (max-width: 600px) {
      nav .links { display: none; }
      #app { padding: 24px 16px 60px; }
    }
  </style>
</head>
<body>

<nav>
  <span class="name">Ahmad Rafee</span>
  <div class="links">
    <a href="https://github.com/ahmad-rafee" target="_blank">GitHub</a>
    <a href="https://linkedin.com/in/ahmad-rafee" target="_blank">LinkedIn</a>
    <a href="mailto:ahmad.rafee@hotmail.com">Email</a>
  </div>
</nav>

<div id="app">
  <div id="status">
    <div class="spinner"></div>
    Loading profile…
  </div>
  <div id="content"></div>
  <footer>
    <p>Source: <a href="https://github.com/ahmad-rafee/ahmad-rafee" target="_blank">github.com/ahmad-rafee/ahmad-rafee</a></p>
  </footer>
</div>

<script>
  marked.setOptions({
    gfm: true,
    breaks: true,
    highlight: (code, lang) => {
      if (lang && hljs.getLanguage(lang)) {
        return hljs.highlight(code, { language: lang }).value;
      }
      return hljs.highlightAuto(code).value;
    }
  });

  async function loadReadme() {
    try {
      const res = await fetch(
        'https://api.github.com/repos/ahmad-rafee/ahmad-rafee/readme',
        { headers: { Accept: 'application/vnd.github.raw+json' } }
      );
      if (!res.ok) throw new Error('Failed to fetch README');
      let md = await res.text();

      // Strip raw HTML div/img tags that don't render well in browser
      // but keep the content meaningful
      md = md
        .replace(/<div[^>]*align="center"[^>]*>/gi, '<div align="center">')
        .replace(/<br\s*\/?>/gi, '\n')
        .replace(/<sub>(.*?)<\/sub>/gi, '*$1*')
        .replace(/<h1>(.*?)<\/h1>/gi, '# $1\n')
        .replace(/<h3>(.*?)<\/h3>/gi, '### $1\n')
        .replace(/<\/?(p|div)[^>]*>/gi, '\n');

      // Render mermaid blocks as proper diagrams
      md = md.replace(/```mermaid([\s\S]*?)```/g, (_, code) => {
        return `<div class="mermaid">${code.trim()}</div>`;
      });

      const html = marked.parse(md);
      document.getElementById('status').style.display = 'none';
      const content = document.getElementById('content');
      content.innerHTML = html;
      content.style.display = 'block';

      hljs.highlightAll();
      mermaid.initialize({ startOnLoad: false, theme: 'dark' });
      mermaid.run();
    } catch (err) {
      document.getElementById('status').innerHTML =
        `<p>Could not load profile — <a href="https://github.com/ahmad-rafee/ahmad-rafee">view on GitHub</a></p>`;
    }
  }

  loadReadme();
</script>
</body>
</html>
